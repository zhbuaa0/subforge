# paraformer-asr 模型注册表
#
# 字段说明：
#   model        —— 必填，ModelScope / HuggingFace 模型 ID（funasr.AutoModel 接受）
#   vad_model    —— 可选，VAD 子模型（无则跳过 VAD）
#   punc_model   —— 可选，标点恢复子模型（无则跳过标点）
#   spk_model    —— 可选，说话人识别子模型（无则 spk 字段为 null）
#   init         —— 传给 AutoModel(...) 构造器的额外参数（如 disable_update）
#   generate     —— 传给 model.generate(...) 的默认运行时参数
#                  preset_spk_num 不写 ⇒ 自动检测（FunASR 内部用谱聚类 + eigengap）
#   postprocess  —— 后处理钩子名称（如 "rich_transcription" 用于 SenseVoice）
#   streaming    —— 是否为流式专用模型（必须用 -online 模型 + 每连接独立 cache）
#   features     —— 元数据，用于 CLI/服务能力自检与提示

default: paraformer-zh

models:
  paraformer-zh:
    model: iic/speech_paraformer-large-vad-punc-spk_asr_nat-zh-cn
    vad_model: iic/speech_fsmn_vad_zh-cn-16k-common-pytorch
    punc_model: iic/punc_ct-transformer_zh-cn-common-vocab272727-pytorch
    spk_model: iic/speech_campplus_sv_zh-cn_16k-common
    init:
      disable_update: true
    generate:
      batch_size_s: 300
    features:
      timestamps: true
      speakers: true
      punc: true
      multilingual: false
      streaming: false

  seaco-paraformer-zh:                   # 多说话人重叠语音（访谈/会议/争吵）专用
    model: iic/speech_seaco_paraformer_large_asr_nat-zh-cn-16k-common-vocab8404-pytorch
    vad_model: iic/speech_fsmn_vad_zh-cn-16k-common-pytorch
    punc_model: iic/punc_ct-transformer_zh-cn-common-vocab272727-pytorch
    init:
      disable_update: true
    generate:
      batch_size_s: 300
    features:
      timestamps: true
      speakers: false  # SeACo 内部已处理多说话人，spk 字段可能空/不准确
      punc: true
      multilingual: false
      streaming: false
      best_for: overlapped_speech

  sensevoice:
    model: iic/SenseVoiceSmall
    init:
      disable_update: true
    generate:
      language: auto
      use_itn: true
      batch_size_s: 300
    postprocess: rich_transcription
    features:
      timestamps: false  # SenseVoice 默认输出段级文本，无 sentence_info
      speakers: false
      punc: true
      multilingual: true  # zh/en/yue/ja/ko
      streaming: false

  paraformer-zh-streaming:
    model: iic/speech_paraformer-large_asr_nat-zh-cn-16k-common-vocab8404-online
    init:
      disable_update: true
    streaming: true
    generate:
      chunk_size: [0, 10, 5]
      encoder_chunk_look_back: 4
      decoder_chunk_look_back: 1
    features:
      timestamps: false
      speakers: false
      punc: true
      multilingual: false
      streaming: true

  moss-transcribe-diarize:                # MOSS-Transcribe-Diarize 0.9B (HF transformers backend)
    backend: moss
    # 指向本地缓存权重(WSL ~/MOSS-Transcribe-Diarize/model_weights);
    # HuggingFace model ID 仅在需要下载时使用。
    model: /home/zhbuaa0/MOSS-Transcribe-Diarize/model_weights
    init:
      trust_remote_code: true
      dtype: bfloat16
      device_map: cuda:0
      local_files_only: true
    generate:
      max_new_tokens: 65536
      do_sample: false
    features:
      timestamps: true
      speakers: true
      punc: true
      multilingual: true    # 50+ languages
      streaming: false      # MOSS 未提供流式推理
      best_for: long_form_meetings_and_podcasts

  # 同模型，走 vLLM 服务端：
  #   1) 在另一终端跑  vllm serve OpenMOSS-Team/MOSS-Transcribe-Diarize --trust-remote-code --port 8001
  #   2) asr transcribe meeting.wav --model moss-transcribe-diarize-vllm [--vllm-url http://127.0.0.1:8001] -o out/
  # 长音频 5-10× 加速 (RTX 4070 Ti 12 GB: RTF 0.3-0.6 vs HF 1.0-4.0)。
  # 见 docs/DEPLOYMENT.md §3.3。
  moss-transcribe-diarize-vllm:
    backend: vllm
    # 指向本地模型缓存,让 subforge 提示信息准确;实际推理走 vllm 服务端
    model: /home/zhbuaa0/MOSS-Transcribe-Diarize/model_weights
    init:
      base_url: ${SUBFORGE_VLLM_BASE_URL:-http://127.0.0.1:8001}
      api_key_env: ${SUBFORGE_VLLM_API_KEY_ENV:-}  # 空 = 无鉴权;需要时设 SUBFORGE_VLLM_API_KEY_ENV=xxxx + 对应 xxxx=$KEY
      timeout: 3600             # 长音频 30+ 分钟,默认设 1 小时
      model_name: OpenMOSS-Team/MOSS-Transcribe-Diarize
    generate:
      max_new_tokens: 65536
      do_sample: false
    features:
      timestamps: true
      speakers: true
      punc: true
      multilingual: true
      streaming: false          # vLLM 也是非流式
      best_for: long_form_meetings_and_podcasts_with_vllm
      requires_external_service: "vllm serve OpenMOSS-Team/MOSS-Transcribe-Diarize --trust-remote-code --port 8001"

# ---------- AI 润色 ----------
# 通过 OpenAI 兼容 Chat Completions 接口调用 LLM，对 ASR 输出做"轻度清理"：
# 删口头禅、修错字、统一标点。保留时间戳和说话人标签。
# API key 通过环境变量注入，**不入 git**。
#
# 用法：
#   $env:MINIMAX_API_KEY = "sk-..."        # PowerShell 临时
#   asr transcribe C3142.wav --polish minimax --format srt,txt
#
# 切换 provider：
#   asr transcribe ... --polish deepseek --format srt
#
# 自定义 provider：复制下面 minimax 条目，改 name / base_url / model / api_key_env 即可。
ai_polish:
  default: minimax

  providers:
    minimax:                              # 默认：MiniMax（OpenAI 兼容协议）
      api_key_env: MINIMAX_API_KEY        # 设置 $env:MINIMAX_API_KEY
      base_url: https://api.minimaxi.com/v1
      model: MiniMax-M3
      temperature: 0.2
      max_tokens: 4096
      batch_size: 20                       # 一次 API 调用合并多少段
      timeout: 60

    deepseek:                             # DeepSeek（中文好、超便宜）
      api_key_env: DEEPSEEK_API_KEY
      base_url: https://api.deepseek.com/v1
      model: deepseek-chat
      temperature: 0.2
      max_tokens: 4096
      batch_size: 20

    openai:                               # OpenAI（国际通用）
      api_key_env: OPENAI_API_KEY
      base_url: https://api.openai.com/v1
      model: gpt-4o-mini
      temperature: 0.2
      max_tokens: 4096
      batch_size: 20